<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2C5AA0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8EDF2;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a3a6a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Printer body -->
  <rect x="112" y="200" width="288" height="152" rx="20" ry="20" fill="#FFFFFF" opacity="0.95" filter="url(#shadow)"/>

  <!-- Printer top slot -->
  <rect x="152" y="188" width="208" height="24" rx="6" ry="6" fill="#D6E4F0"/>

  <!-- Paper coming out bottom -->
  <g filter="url(#shadow)">
    <rect x="156" y="320" width="200" height="100" rx="6" ry="6" fill="url(#paper)"/>
    <!-- Text lines on paper -->
    <line x1="180" y1="348" x2="320" y2="348" stroke="#B0C4DE" stroke-width="4" stroke-linecap="round"/>
    <line x1="180" y1="365" x2="290" y2="365" stroke="#B0C4DE" stroke-width="4" stroke-linecap="round"/>
    <line x1="180" y1="382" x2="305" y2="382" stroke="#B0C4DE" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Printer control panel -->
  <circle cx="340" cy="260" r="10" fill="#4A90E2"/>
  <circle cx="340" cy="260" r="5" fill="#FFFFFF" opacity="0.8"/>
  <rect x="148" y="250" width="140" height="20" rx="4" ry="4" fill="#E8EDF2"/>

  <!-- Paper feed top -->
  <rect x="172" y="120" width="168" height="80" rx="4" ry="4" fill="url(#paper)" filter="url(#shadow)"/>
  <line x1="196" y1="145" x2="316" y2="145" stroke="#B0C4DE" stroke-width="3" stroke-linecap="round"/>
  <line x1="196" y1="160" x2="290" y2="160" stroke="#B0C4DE" stroke-width="3" stroke-linecap="round"/>
  <line x1="196" y1="175" x2="300" y2="175" stroke="#B0C4DE" stroke-width="3" stroke-linecap="round"/>

  <!-- WiFi/network signal icon (top-right) -->
  <g transform="translate(390, 110)" opacity="0.95">
    <path d="M0,28 A28,28 0 0,1 56,28" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <path d="M8,24 A20,20 0 0,1 48,24" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <path d="M16,20 A12,12 0 0,1 40,20" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <circle cx="28" cy="32" r="5" fill="#FFFFFF"/>
  </g>
</svg>
